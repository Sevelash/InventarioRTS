<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación MFA — RTS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --navy:#233C6E; --blue:#089ACF; }
    body {
      margin: 0; min-height: 100vh;
      background: linear-gradient(135deg, #1a2e55, #233C6E, #2166A9);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Aptos','Calibri','Segoe UI',sans-serif;
    }
    .mfa-card {
      background: #fff; border-radius: 16px; width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,.35); overflow: hidden;
    }
    .mfa-header {
      background: linear-gradient(135deg, var(--navy), #2166A9);
      padding: 32px; text-align: center;
    }
    .mfa-icon { font-size: 2.5rem; color: #6EC1E4; }
    .mfa-header h2 {
      font-family: 'Oswald', sans-serif; font-size: 20px;
      color: #fff; margin: 12px 0 4px; font-weight: 600;
    }
    .mfa-header p { font-size: 12.5px; color: rgba(255,255,255,.6); margin: 0; }
    .mfa-body { padding: 32px; }
    .code-input {
      font-size: 28px; font-weight: 700; letter-spacing: 12px;
      text-align: center; border: 2px solid #DDE3ED; border-radius: 10px;
      padding: 14px; width: 100%; color: var(--navy);
      transition: border-color .15s;
    }
    .code-input:focus {
      border-color: var(--blue); outline: none;
      box-shadow: 0 0 0 3px rgba(8,154,207,.15);
    }
    .btn-verify {
      background: var(--navy); color: #fff; border: none;
      border-radius: 8px; padding: 12px; font-size: 15px;
      font-weight: 700; width: 100%; cursor: pointer;
      margin-top: 16px; transition: background .15s;
    }
    .btn-verify:hover { background: var(--blue); }
    .back-link { display: block; text-align: center; font-size: 12.5px; margin-top: 16px; color: #6c757d; }
    .back-link a { color: var(--blue); }
    .error-msg {
      background: #FFF5F5; border: 1px solid #FCC; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #dc3545;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
  </style>
</head>
<body>
<div class="mfa-card">
  <div class="mfa-header">
    <div class="mfa-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h2>Autenticación en 2 pasos</h2>
    <p>Ingresa el código de 6 dígitos de tu app autenticadora</p>
  </div>
  <div class="mfa-body">

    {% if error %}
    <div class="error-msg">
      <i class="bi bi-exclamation-triangle-fill"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <input type="text" name="code" id="codeInput" class="code-input"
             placeholder="000000" pattern="[0-9]{6}" inputmode="numeric"
             maxlength="6" autofocus required>
      <button type="submit" class="btn-verify">
        <i class="bi bi-check-circle me-2"></i>Verificar
      </button>
    </form>

    <div class="back-link">
      ¿Problemas? <a href="{{ url_for('auth.login') }}">Volver al inicio</a>
    </div>
  </div>
</div>

<script nonce="{{ csp_nonce }}">
// Auto-submit when 6 digits entered
document.getElementById('codeInput').addEventListener('input', function () {
  if (this.value.replace(/\D/g, '').length === 6) {
    this.form.submit();
  }
});
// Only allow digits
document.getElementById('codeInput').addEventListener('keypress', function (e) {
  if (!/[0-9]/.test(e.key)) e.preventDefault();
});
</script>
</body>
</html>
