version: "3.9"

services:
  rts-app:
    build: .
    container_name: rts-inventario
    restart: unless-stopped
    ports:
      - "8000:8000"        # Cambia el primer número si 8000 está ocupado (ej. "5050:8000")
    environment:
      # ── Obligatorio ──────────────────────────────────────────────────────────
      SECRET_KEY: ${SECRET_KEY}          # Define en .env (nunca hardcodear)
      DATABASE_URL: sqlite:////data/rts_inventory.db
      FLASK_ENV: production
    volumes:
      - rts-data:/data                   # Base de datos persistente
      - rts-uploads:/app/static/images   # Logos e imágenes subidas
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/auth/login')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  rts-data:
  rts-uploads:
